<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学祭ARマスコット - マーカーなし版</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8fafc;
      background:
        radial-gradient(circle at top left, #2563eb 0, transparent 34%),
        radial-gradient(circle at bottom right, #dc2626 0, transparent 34%),
        #020617;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .app {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 16px;
      align-items: stretch;
    }

    .panel {
      background: rgba(15, 23, 42, .72);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      backdrop-filter: blur(16px);
    }

    model-viewer {
      width: 100%;
      height: 680px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      --poster-color: transparent;
    }

    .side {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.75;
      font-size: 15px;
    }

    .button {
      display: block;
      width: 100%;
      appearance: none;
      border: 0;
      border-radius: 18px;
      padding: 15px 16px;
      background: #f8fafc;
      color: #0f172a;
      font-weight: 900;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      cursor: pointer;
    }

    .note {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.65;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 80px 1fr 56px;
      gap: 10px;
      align-items: center;
      color: #cbd5e1;
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #38bdf8;
    }

    .value {
      text-align: right;
      color: #f8fafc;
      font-weight: 800;
    }

    .steps {
      margin-top: auto;
      display: grid;
      gap: 10px;
    }

    .step {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 10px;
      align-items: start;
      color: #cbd5e1;
      line-height: 1.55;
      font-size: 14px;
    }

    .num {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(56,189,248,.18);
      color: #7dd3fc;
      font-weight: 900;
    }

    @media (max-width: 820px) {
      body { padding: 0; }
      .app {
        grid-template-columns: 1fr;
        min-height: 100vh;
      }
      .panel {
        border-radius: 0;
      }
      model-viewer {
        height: 62vh;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="panel">
      <model-viewer
        id="viewer"
        src="./mascot.glb"
        alt="学祭ARマスコット"
        camera-controls
        touch-action="pan-y"
        autoplay
        ar
        ar-modes="webxr scene-viewer quick-look"
        shadow-intensity="1"
        exposure="1"
        environment-image="neutral"
        camera-orbit="0deg 75deg 3.2m"
        field-of-view="30deg"
        scale="1 1 1">
      </model-viewer>
    </section>

    <section class="panel side">
      <h1>マーカーなし<br>ARマスコット</h1>

      <p>
        マーカーを使わず、スマホのAR機能で現実空間に3Dマスコットを置く版です。
        画面内のARボタンを押して、床や机に配置できます。
      </p>

      <button class="button" onclick="openAR()">ARで表示</button>

      <div class="controls">
        <div class="row">
          <span>サイズ</span>
          <input id="scaleSlider" type="range" min="0.2" max="2.5" step="0.05" value="1">
          <span class="value" id="scaleValue">1.00x</span>
        </div>

        <div class="row">
          <span>明るさ</span>
          <input id="exposureSlider" type="range" min="0.4" max="2.2" step="0.05" value="1">
          <span class="value" id="exposureValue">1.00</span>
        </div>
      </div>

      <div class="note">
        iPhoneはSafari、AndroidはChrome推奨。ARボタンが出ない場合は、HTTPSの公開URLで開けているか確認してください。
      </div>

      <div class="steps">
        <div class="step">
          <div class="num">1</div>
          <div>スマホでこのページを開く。</div>
        </div>
        <div class="step">
          <div class="num">2</div>
          <div>「ARで表示」を押す。</div>
        </div>
        <div class="step">
          <div class="num">3</div>
          <div>床や机にマスコットを置く。</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const viewer = document.querySelector("#viewer");
    const scaleSlider = document.querySelector("#scaleSlider");
    const exposureSlider = document.querySelector("#exposureSlider");
    const scaleValue = document.querySelector("#scaleValue");
    const exposureValue = document.querySelector("#exposureValue");

    function openAR() {
      viewer.activateAR();
    }

    scaleSlider.addEventListener("input", (e) => {
      const value = Number(e.target.value);
      viewer.setAttribute("scale", `${value} ${value} ${value}`);
      scaleValue.textContent = value.toFixed(2) + "x";
    });

    exposureSlider.addEventListener("input", (e) => {
      const value = Number(e.target.value);
      viewer.setAttribute("exposure", value);
      exposureValue.textContent = value.toFixed(2);
    });
  </script>
</body>
</html>
