<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>学祭ARマスコット試作</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: white;
    }

    #startScreen {
      position: fixed;
      z-index: 9999;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, #2563eb 0, transparent 35%),
        radial-gradient(circle at bottom right, #dc2626 0, transparent 35%),
        #020617;
    }

    .card {
      width: min(560px, 100%);
      padding: 24px;
      border-radius: 28px;
      background: rgba(15, 23, 42, .8);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 7vw, 44px);
      letter-spacing: -.04em;
      line-height: 1.05;
    }

    p {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.7;
      font-size: 15px;
    }

    #startBtn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      font-weight: 900;
      font-size: 17px;
      background: #f8fafc;
      color: #0f172a;
      cursor: pointer;
    }

    .mini {
      margin-top: 12px;
      font-size: 12px;
      color: #94a3b8;
    }

    .hud {
      position: fixed;
      z-index: 10;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      color: white;
      background: rgba(15, 23, 42, .72);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(12px);
      line-height: 1.55;
      font-size: 14px;
    }

    .hud strong { color: #7dd3fc; }

    .top {
      position: fixed;
      z-index: 10;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      color: white;
      background: rgba(15, 23, 42, .72);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(12px);
      font-size: 13px;
    }

    a.marker-link {
      pointer-events: auto;
      color: #0f172a;
      background: #f8fafc;
      font-weight: 800;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
    }

    #arContainer {
      display: none;
      position: fixed;
      inset: 0;
    }
  </style>

  <script>
    const AFRAME_COMPONENT_CODE = `
      AFRAME.registerComponent("mascot-dance", {
        schema: { delay: { type: "number", default: 0 } },
        init: function () { this.t = this.data.delay; },
        tick: function (time, delta) {
          this.t += delta / 1000;
          const bounce = Math.sin(this.t * 5) * 0.12;
          const sway = Math.sin(this.t * 3) * 10;
          const twist = Math.sin(this.t * 2.4) * 6;
          this.el.setAttribute("position", this.el.dataset.baseX + " " + (0.05 + bounce) + " " + this.el.dataset.baseZ);
          this.el.setAttribute("rotation", "0 " + sway + " " + twist);
        }
      });
    `;

    async function requestIOSPermissions() {
      try {
        if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") {
          await DeviceMotionEvent.requestPermission();
        }
      } catch (e) {}

      try {
        if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
          await DeviceOrientationEvent.requestPermission();
        }
      } catch (e) {}
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    function mascotHTML(x, z, shirtColor, skirtColor, nameText, delay, capColor) {
      return `
        <a-entity mascot-dance="delay: ${delay}" data-base-x="${x}" data-base-z="${z}" scale="0.75 0.75 0.75">

          <!-- shadow/base -->
          <a-circle position="0 0.01 0" rotation="-90 0 0" radius="0.62" color="#111827" opacity="0.22"></a-circle>

          <!-- legs -->
          <a-cylinder position="-0.15 0.18 0" radius="0.08" height="0.36" color="#8b5a2b"></a-cylinder>
          <a-cylinder position="0.15 0.18 0" radius="0.08" height="0.36" color="#8b5a2b"></a-cylinder>

          <!-- body / shirt -->
          <a-sphere position="0 0.62 0" radius="0.42" color="${shirtColor}" scale="1.0 1.15 0.85"></a-sphere>
          <a-sphere position="0 0.82 -0.02" radius="0.32" color="#8b5a2b" scale="1.25 0.85 0.8"></a-sphere>

          <!-- belly / muzzle color patch -->
          <a-sphere position="0 0.7 -0.33" radius="0.22" color="#f2e3cf" scale="1.35 0.75 0.35"></a-sphere>

          <!-- head -->
          <a-sphere position="0 1.22 0" radius="0.43" color="#8b5a2b" scale="1.0 0.95 0.95"></a-sphere>

          <!-- big mouth/muzzle -->
          <a-sphere position="0 1.1 -0.32" radius="0.30" color="#f2e3cf" scale="1.35 0.78 0.45"></a-sphere>

          <!-- eyes -->
          <a-sphere position="-0.13 1.29 -0.36" radius="0.045" color="#ffffff"></a-sphere>
          <a-sphere position="0.13 1.29 -0.36" radius="0.045" color="#ffffff"></a-sphere>
          <a-sphere position="-0.13 1.285 -0.395" radius="0.022" color="#111827"></a-sphere>
          <a-sphere position="0.13 1.285 -0.395" radius="0.022" color="#111827"></a-sphere>

          <!-- nose -->
          <a-sphere position="0 1.16 -0.58" radius="0.035" color="#111827"></a-sphere>

          <!-- ears -->
          <a-sphere position="-0.31 1.35 0" radius="0.13" color="#7a461f" scale="0.8 1.0 0.45"></a-sphere>
          <a-sphere position="0.31 1.35 0" radius="0.13" color="#7a461f" scale="0.8 1.0 0.45"></a-sphere>

          <!-- horns -->
          <a-cone position="-0.18 1.58 0.02" radius-bottom="0.055" radius-top="0.0" height="0.18" color="#e8d8bb" rotation="0 0 12"></a-cone>
          <a-cone position="0.18 1.58 0.02" radius-bottom="0.055" radius-top="0.0" height="0.18" color="#e8d8bb" rotation="0 0 -12"></a-cone>

          <!-- cap -->
          <a-sphere position="0 1.55 -0.03" radius="0.24" color="${capColor}" scale="1.08 0.35 0.85"></a-sphere>
          <a-cylinder position="0 1.61 -0.02" radius="0.055" height="0.06" color="#f9fafb"></a-cylinder>

          <!-- arms dancing -->
          <a-cylinder position="-0.45 0.85 -0.02" rotation="0 0 55" radius="0.055" height="0.55" color="#8b5a2b"
            animation="property: rotation; from: 0 0 55; to: 0 0 -18; dur: 520; dir: alternate; loop: true; easing: easeInOutSine"></a-cylinder>
          <a-cylinder position="0.45 0.85 -0.02" rotation="0 0 -55" radius="0.055" height="0.55" color="#8b5a2b"
            animation="property: rotation; from: 0 0 -55; to: 0 0 18; dur: 520; dir: alternate; loop: true; easing: easeInOutSine"></a-cylinder>

          <!-- skirt/pants accent -->
          <a-cylinder position="0 0.38 -0.01" radius="0.36" height="0.24" color="${skirtColor}"></a-cylinder>

          <!-- chest label -->
          <a-text value="${nameText}" position="0 0.78 -0.47" rotation="-18 0 0" align="center" color="#ffffff" width="1.7"></a-text>
        </a-entity>
      `;
    }

    async function startAR() {
      const btn = document.getElementById("startBtn");
      btn.textContent = "起動中...";
      btn.disabled = true;

      await requestIOSPermissions();

      try {
        await loadScript("https://aframe.io/releases/1.5.0/aframe.min.js");
        await loadScript("https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js");
        eval(AFRAME_COMPONENT_CODE);

        document.getElementById("startScreen").style.display = "none";
        document.getElementById("arContainer").style.display = "block";

        document.getElementById("arContainer").innerHTML = `
          <div class="top">
            <div class="badge">学祭ARマスコット試作</div>
            <a class="marker-link" href="./marker.png" target="_blank" rel="noopener">マーカー表示</a>
          </div>

          <div class="hud">
            <strong>使い方：</strong>
            別端末・PC・印刷で「マーカー表示」を開く → カメラを太い黒枠マーカー全体に向ける → マスコットが出ます。
          </div>

          <a-scene
            embedded
            arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
            renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
            vr-mode-ui="enabled: false">

            <a-marker type="pattern" url="./marker.patt" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
              <a-circle position="0 0 0" rotation="-90 0 0" radius="1.35" color="#38bdf8" opacity="0.20"></a-circle>
              ${mascotHTML("-0.47", "0", "#ef4444", "#dc2626", "NUSS", "0", "#f59e0b")}
              ${mascotHTML("0.47", "0", "#38bdf8", "#60a5fa", "AR", "0.6", "#2563eb")}
              <a-text value="Welcome to Nihon Univ!" position="0 1.8 0" rotation="-25 0 0" align="center" color="#ffffff" width="4.2"></a-text>
            </a-marker>

            <a-entity camera></a-entity>
          </a-scene>
        `;
      } catch (e) {
        btn.disabled = false;
        btn.textContent = "AR開始";
        alert("ARの起動に失敗しました。Safari/Chromeで開いているか、通信環境を確認してください。");
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("startBtn").addEventListener("click", startAR);
    });
  </script>
</head>

<body>
  <div id="startScreen">
    <div class="card">
      <h1>学祭AR<br>マスコット試作</h1>
      <p>
        写真のマスコットを参考にした、簡易3Dデフォルメ版です。<br>
        「AR開始」を押して、カメラ・モーションを許可してください。
      </p>
      <button id="startBtn">AR開始</button>
      <div class="mini">iPhoneはSafari、AndroidはChrome推奨</div>
    </div>
  </div>

  <div id="arContainer"></div>
</body>
</html>
