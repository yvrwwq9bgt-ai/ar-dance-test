<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>学祭ARマスコット - 3Dモデル版</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: white;
      touch-action: none;
    }

    #startScreen {
      position: fixed;
      z-index: 9999;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, #2563eb 0, transparent 35%),
        radial-gradient(circle at bottom right, #dc2626 0, transparent 35%),
        #020617;
    }

    .card {
      width: min(560px, 100%);
      padding: 24px;
      border-radius: 28px;
      background: rgba(15, 23, 42, .82);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 7vw, 44px);
      letter-spacing: -.04em;
      line-height: 1.05;
    }

    p {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.7;
      font-size: 15px;
    }

    #startBtn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      font-weight: 900;
      font-size: 17px;
      background: #f8fafc;
      color: #0f172a;
      cursor: pointer;
    }

    .mini {
      margin-top: 12px;
      font-size: 12px;
      color: #94a3b8;
    }

    .hud {
      position: fixed;
      z-index: 10;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      color: white;
      background: rgba(15, 23, 42, .72);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(12px);
      line-height: 1.55;
      font-size: 14px;
      pointer-events: none;
    }

    .hud strong { color: #7dd3fc; }

    .top {
      position: fixed;
      z-index: 10;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      color: white;
      background: rgba(15, 23, 42, .72);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(12px);
      font-size: 13px;
    }

    a.marker-link {
      pointer-events: auto;
      color: #0f172a;
      background: #f8fafc;
      font-weight: 800;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
    }

    .controls {
      position: fixed;
      z-index: 20;
      right: 12px;
      bottom: 112px;
      display: flex;
      gap: 8px;
    }

    .controlBtn {
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 10px 14px;
      color: white;
      background: rgba(15,23,42,.75);
      backdrop-filter: blur(12px);
      font-weight: 900;
      font-size: 13px;
    }

    #arContainer {
      display: none;
      position: fixed;
      inset: 0;
      touch-action: none;
    }
  </style>

  <script>
    let modelScale = 0.62;
    let modelX = 0;
    let modelY = 0;
    let modelZ = 0;
    let modelRotationY = 180;

    let lastPinchDistance = null;
    let isDragging = false;
    let lastTouchX = null;
    let lastTouchY = null;

    const MIN_SCALE = 0.18;
    const MAX_SCALE = 2.2;

    window.modelX = modelX;
    window.modelY = modelY;
    window.modelZ = modelZ;
    window.modelScale = modelScale;
    window.modelRotationY = modelRotationY;

    const AFRAME_COMPONENT_CODE = `
      AFRAME.registerComponent("mascot-idle-dance", {
        init: function () { this.t = 0; },
        tick: function (time, delta) {
          this.t += delta / 1000;

          const bounce = Math.sin(this.t * 3.0) * 0.025;
          const sway = Math.sin(this.t * 2.0) * 4.0;

          const x = window.modelX ?? 0;
          const y = window.modelY ?? 0;
          const z = window.modelZ ?? 0;
          const s = window.modelScale ?? 0.62;
          const ry = window.modelRotationY ?? 180;

          this.el.setAttribute("position", x + " " + (y + bounce) + " " + z);
          this.el.setAttribute("scale", s + " " + s + " " + s);
          this.el.setAttribute("rotation", "0 " + (ry + sway) + " 0");
        }
      });
    `;

    function applyModelTransform() {
      window.modelX = modelX;
      window.modelY = modelY;
      window.modelZ = modelZ;
      window.modelScale = modelScale;
      window.modelRotationY = modelRotationY;

      const badge = document.getElementById("scaleBadge");
      if (badge) badge.textContent = `3Dモデル ${modelScale.toFixed(2)}x`;
    }

    function distance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function setupTouchControls() {
      const area = document.getElementById("arContainer");

      area.addEventListener("touchstart", (e) => {
        if (e.target.closest(".marker-link") || e.target.closest(".controlBtn")) return;

        if (e.touches.length === 2) {
          lastPinchDistance = distance(e.touches[0], e.touches[1]);
          isDragging = false;
        } else if (e.touches.length === 1) {
          isDragging = true;
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
        }
      }, { passive: false });

      area.addEventListener("touchmove", (e) => {
        if (e.target.closest(".marker-link") || e.target.closest(".controlBtn")) return;
        e.preventDefault();

        if (e.touches.length === 2) {
          const current = distance(e.touches[0], e.touches[1]);
          if (lastPinchDistance) {
            const ratio = current / lastPinchDistance;
            modelScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, modelScale * ratio));
            applyModelTransform();
          }
          lastPinchDistance = current;
          isDragging = false;
        } else if (e.touches.length === 1 && isDragging) {
          const touch = e.touches[0];
          const dx = touch.clientX - lastTouchX;
          const dy = touch.clientY - lastTouchY;

          modelX += dx * 0.0028;
          modelY -= dy * 0.0028;

          modelX = Math.max(-1.5, Math.min(1.5, modelX));
          modelY = Math.max(-0.8, Math.min(1.8, modelY));

          lastTouchX = touch.clientX;
          lastTouchY = touch.clientY;
          applyModelTransform();
        }
      }, { passive: false });

      area.addEventListener("touchend", (e) => {
        if (e.touches.length < 2) lastPinchDistance = null;
        if (e.touches.length === 0) {
          isDragging = false;
          lastTouchX = null;
          lastTouchY = null;
        }
      }, { passive: false });
    }

    function resetModel() {
      modelScale = 0.62;
      modelX = 0;
      modelY = 0;
      modelZ = 0;
      modelRotationY = 180;
      applyModelTransform();
    }

    function rotateModel() {
      modelRotationY += 90;
      applyModelTransform();
    }

    async function requestIOSPermissions() {
      try {
        if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") {
          await DeviceMotionEvent.requestPermission();
        }
      } catch(e) {}

      try {
        if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
          await DeviceOrientationEvent.requestPermission();
        }
      } catch(e) {}
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    async function startAR() {
      const btn = document.getElementById("startBtn");
      btn.textContent = "起動中...";
      btn.disabled = true;

      await requestIOSPermissions();

      try {
        await loadScript("https://aframe.io/releases/1.5.0/aframe.min.js");
        await loadScript("https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js");
        eval(AFRAME_COMPONENT_CODE);

        document.getElementById("startScreen").style.display = "none";
        document.getElementById("arContainer").style.display = "block";

        document.getElementById("arContainer").innerHTML = `
          <div class="top">
            <div class="badge" id="scaleBadge">3Dモデル 0.62x</div>
            <a class="marker-link" href="./marker.png" target="_blank" rel="noopener">マーカー表示</a>
          </div>

          <div class="controls">
            <button class="controlBtn" onclick="rotateModel()">回転</button>
            <button class="controlBtn" onclick="resetModel()">リセット</button>
          </div>

          <div class="hud">
            <strong>操作：</strong>
            2本指ピンチで拡大・縮小。1本指ドラッグで位置調整。「回転」で向きを変えられます。
          </div>

          <a-scene
            embedded
            arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
            renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
            vr-mode-ui="enabled: false">

            <a-assets>
              <a-asset-item id="mascotModelAsset" src="./mascot.glb"></a-asset-item>
            </a-assets>

            <a-marker type="pattern" url="./marker.patt" smooth="true" smoothCount="6" smoothTolerance="0.01" smoothThreshold="2">
              <a-entity light="type: ambient; intensity: 1.25"></a-entity>
              <a-entity light="type: directional; intensity: 0.9" position="0 2 1"></a-entity>

              <a-entity
                id="mascotModel"
                mascot-idle-dance
                gltf-model="#mascotModelAsset"
                position="0 0 0"
                scale="0.62 0.62 0.62"
                rotation="0 180 0">
              </a-entity>
            </a-marker>

            <a-entity camera></a-entity>
          </a-scene>
        `;

        setupTouchControls();
        applyModelTransform();

      } catch (e) {
        btn.disabled = false;
        btn.textContent = "AR開始";
        alert("ARの起動に失敗しました。Safari/Chromeで開いているか、通信環境を確認してください。");
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("startBtn").addEventListener("click", startAR);
    });
  </script>
</head>

<body>
  <div id="startScreen">
    <div class="card">
      <h1>学祭AR<br>3Dマスコット</h1>
      <p>
        GitHubにアップロードした <strong>mascot.glb</strong> を読み込む版です。<br>
        「AR開始」を押して、カメラ・モーションを許可してください。
      </p>
      <button id="startBtn">AR開始</button>
      <div class="mini">iPhoneはSafari、AndroidはChrome推奨</div>
    </div>
  </div>

  <div id="arContainer"></div>
</body>
</html>
