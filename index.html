<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>学祭ARマスコット - 写真正面版</title>
  <style>
    body { margin:0; overflow:hidden; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#000; color:white; }
    #startScreen { position:fixed; z-index:9999; inset:0; display:grid; place-items:center; padding:24px; background:radial-gradient(circle at top left,#2563eb 0,transparent 35%),radial-gradient(circle at bottom right,#dc2626 0,transparent 35%),#020617; }
    .card { width:min(560px,100%); padding:24px; border-radius:28px; background:rgba(15,23,42,.82); border:1px solid rgba(255,255,255,.18); box-shadow:0 24px 80px rgba(0,0,0,.35); text-align:center; }
    h1 { margin:0 0 12px; font-size:clamp(28px,7vw,44px); letter-spacing:-.04em; line-height:1.05; }
    p { margin:0 0 18px; color:#cbd5e1; line-height:1.7; font-size:15px; }
    #startBtn { width:100%; border:0; border-radius:18px; padding:16px 18px; font-weight:900; font-size:17px; background:#f8fafc; color:#0f172a; cursor:pointer; }
    .mini { margin-top:12px; font-size:12px; color:#94a3b8; }
    .hud { position:fixed; z-index:10; left:12px; right:12px; bottom:12px; padding:14px 16px; border-radius:18px; color:white; background:rgba(15,23,42,.72); border:1px solid rgba(255,255,255,.18); backdrop-filter:blur(12px); line-height:1.55; font-size:14px; }
    .hud strong { color:#7dd3fc; }
    .top { position:fixed; z-index:10; top:12px; left:12px; right:12px; display:flex; gap:8px; align-items:center; justify-content:space-between; pointer-events:none; }
    .badge { padding:8px 12px; border-radius:999px; color:white; background:rgba(15,23,42,.72); border:1px solid rgba(255,255,255,.18); backdrop-filter:blur(12px); font-size:13px; }
    a.marker-link { pointer-events:auto; color:#0f172a; background:#f8fafc; font-weight:800; text-decoration:none; padding:8px 12px; border-radius:999px; font-size:13px; }
    #arContainer { display:none; position:fixed; inset:0; }
  </style>
  <script>
    const AFRAME_COMPONENT_CODE = `
      AFRAME.registerComponent("photo-mascot-dance", {
        init: function () { this.t = 0; },
        tick: function (time, delta) {
          this.t += delta / 1000;
          const bounce = Math.sin(this.t * 3.2) * 0.045;
          const sway = Math.sin(this.t * 2.0) * 1.7;
          this.el.setAttribute("position", "0 " + (0.92 + bounce) + " 0");
          this.el.setAttribute("rotation", "0 " + (180 + sway) + " 0");
        }
      });
    `;

    async function requestIOSPermissions() {
      try { if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") await DeviceMotionEvent.requestPermission(); } catch(e) {}
      try { if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") await DeviceOrientationEvent.requestPermission(); } catch(e) {}
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    async function startAR() {
      const btn = document.getElementById("startBtn");
      btn.textContent = "起動中...";
      btn.disabled = true;
      await requestIOSPermissions();

      try {
        await loadScript("https://aframe.io/releases/1.5.0/aframe.min.js");
        await loadScript("https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js");
        eval(AFRAME_COMPONENT_CODE);
        document.getElementById("startScreen").style.display = "none";
        document.getElementById("arContainer").style.display = "block";
        document.getElementById("arContainer").innerHTML = `
          <div class="top">
            <div class="badge">学祭ARマスコット / 写真正面版</div>
            <a class="marker-link" href="./marker.png" target="_blank" rel="noopener">マーカー表示</a>
          </div>
          <div class="hud">
            <strong>使い方：</strong>
            別端末・PC・印刷で「マーカー表示」を開く → カメラを太い黒枠マーカー全体に向ける → 写真のマスコットが正面に出ます。
          </div>
          <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;" renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;" vr-mode-ui="enabled: false">
            <a-assets>
              <img id="mascotFront" src="./mascot_front.png">
            </a-assets>
            <a-marker type="pattern" url="./marker.patt" smooth="true" smoothCount="6" smoothTolerance="0.01" smoothThreshold="2">
              <a-entity photo-mascot-dance>
                <a-plane
                  src="#mascotFront"
                  position="0 0 0"
                  width="1.7"
                  height="1.7"
                  material="transparent: true; alphaTest: 0.08; side: double; shader: flat">
                </a-plane>
              </a-entity>
            </a-marker>
            <a-entity camera></a-entity>
          </a-scene>
        `;
      } catch (e) {
        btn.disabled = false;
        btn.textContent = "AR開始";
        alert("ARの起動に失敗しました。Safari/Chromeで開いているか、通信環境を確認してください。");
      }
    }
    window.addEventListener("DOMContentLoaded", () => document.getElementById("startBtn").addEventListener("click", startAR));
  </script>
</head>
<body>
  <div id="startScreen">
    <div class="card">
      <h1>学祭AR<br>マスコット</h1>
      <p>正面から見たときに写真に一番近くなる版です。<br>「AR開始」を押して、カメラ・モーションを許可してください。</p>
      <button id="startBtn">AR開始</button>
      <div class="mini">iPhoneはSafari、AndroidはChrome推奨</div>
    </div>
  </div>
  <div id="arContainer"></div>
</body>
</html>
