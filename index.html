<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>学祭ARダンス試作 - マーカー版</title>

  <!-- A-Frame + AR.js: マーカー認識AR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
    }

    .hud {
      position: fixed;
      z-index: 10;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      color: white;
      background: rgba(15, 23, 42, .72);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(12px);
      line-height: 1.55;
      font-size: 14px;
    }

    .hud strong {
      color: #7dd3fc;
    }

    .top {
      position: fixed;
      z-index: 10;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      color: white;
      background: rgba(15, 23, 42, .72);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(12px);
      font-size: 13px;
    }

    a.marker-link {
      pointer-events: auto;
      color: #0f172a;
      background: #f8fafc;
      font-weight: 800;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
    }

    .pulse {
      position: fixed;
      z-index: 9;
      inset: 0;
      border: 4px solid rgba(125, 211, 252, .45);
      pointer-events: none;
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: .25; }
      50% { opacity: .7; }
    }
  </style>

  <script>
    AFRAME.registerComponent("simple-dance", {
      init: function () {
        this.t = 0;
      },
      tick: function (time, delta) {
        this.t += delta / 1000;
        const el = this.el;

        const bounce = Math.sin(this.t * 5) * 0.18;
        const sway = Math.sin(this.t * 3) * 18;
        const spin = Math.sin(this.t * 2) * 12;

        el.setAttribute("position", `0 ${0.75 + bounce} 0`);
        el.setAttribute("rotation", `0 ${sway} ${spin}`);
      }
    });
  </script>
</head>

<body>
  <div class="pulse"></div>

  <div class="top">
    <div class="badge">学祭ARダンス試作 / Marker AR</div>
    <a
      class="marker-link"
      href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/HIRO.jpg"
      target="_blank"
      rel="noopener"
    >マーカー表示</a>
  </div>

  <div class="hud">
    <strong>使い方：</strong>
    右上の「マーカー表示」を別端末・別画面・印刷で開く → このカメラをマーカーに向ける → マーカー上に3Dキャラが出ます。
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    vr-mode-ui="enabled: false">

    <!-- Hiroマーカーを認識したら、この中の3Dが表示される -->
    <a-marker preset="hiro">

      <!-- 床っぽい円 -->
      <a-circle
        position="0 0 0"
        rotation="-90 0 0"
        radius="1.05"
        color="#38bdf8"
        opacity="0.28">
      </a-circle>

      <!-- 仮キャラ。GLBモデルがなくても動くよう、箱・球・円柱で作成 -->
      <a-entity id="character" simple-dance>

        <a-cylinder
          position="0 0.55 0"
          radius="0.28"
          height="0.7"
          color="#38bdf8">
        </a-cylinder>

        <a-sphere
          position="0 1.08 0"
          radius="0.24"
          color="#f8fafc">
        </a-sphere>

        <a-sphere
          position="-0.08 1.12 -0.2"
          radius="0.035"
          color="#0f172a">
        </a-sphere>

        <a-sphere
          position="0.08 1.12 -0.2"
          radius="0.035"
          color="#0f172a">
        </a-sphere>

        <a-cylinder
          position="-0.36 0.65 0"
          rotation="0 0 35"
          radius="0.055"
          height="0.55"
          color="#f472b6"
          animation="property: rotation; from: 0 0 35; to: 0 0 -35; dur: 450; dir: alternate; loop: true; easing: easeInOutSine">
        </a-cylinder>

        <a-cylinder
          position="0.36 0.65 0"
          rotation="0 0 -35"
          radius="0.055"
          height="0.55"
          color="#f472b6"
          animation="property: rotation; from: 0 0 -35; to: 0 0 35; dur: 450; dir: alternate; loop: true; easing: easeInOutSine">
        </a-cylinder>

        <a-cylinder
          position="-0.14 0.1 0"
          radius="0.06"
          height="0.45"
          color="#f8fafc"
          animation="property: rotation; from: 0 0 8; to: 0 0 -18; dur: 380; dir: alternate; loop: true; easing: easeInOutSine">
        </a-cylinder>

        <a-cylinder
          position="0.14 0.1 0"
          radius="0.06"
          height="0.45"
          color="#f8fafc"
          animation="property: rotation; from: 0 0 -8; to: 0 0 18; dur: 380; dir: alternate; loop: true; easing: easeInOutSine">
        </a-cylinder>

      </a-entity>

      <!-- 吹き出し -->
      <a-text
        value="Welcome!"
        position="0 1.65 0"
        rotation="-25 0 0"
        align="center"
        color="#ffffff"
        width="4">
      </a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
